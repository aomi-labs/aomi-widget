name: Publish Skills

on:
  push:
    branches:
      - main
    paths:
      - packages/client/skills/**
  workflow_dispatch:

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    concurrency:
      group: publish-skills
      cancel-in-progress: true
    permissions:
      contents: read

    steps:
      - name: Checkout widget repo
        uses: actions/checkout@v4

      - name: Checkout skills repo
        uses: actions/checkout@v4
        with:
          repository: aomi-labs/skills
          ref: main
          token: ${{ secrets.AOMI_SKILLS_PUSH_TOKEN }}
          path: skills-upstream

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish vendored skills
        run: node ./scripts/publish-skills.mjs --source ./packages/client/skills --dest ./skills-upstream

      - name: Detect published changes
        id: changes
        run: |
          if git -C skills-upstream diff --quiet --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          git -C skills-upstream status --short

      - name: Commit sync branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git -C skills-upstream config user.name "github-actions[bot]"
          git -C skills-upstream config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C skills-upstream checkout -B chore/sync-widget-skills
          git -C skills-upstream add -A
          git -C skills-upstream commit -m "chore: sync skills from aomi-widget"
          git -C skills-upstream push --force --set-upstream origin chore/sync-widget-skills

      - name: Create or update skills PR
        if: steps.changes.outputs.changed == 'true'
        env:
          BRANCH_NAME: chore/sync-widget-skills
          GH_TOKEN: ${{ secrets.AOMI_SKILLS_PUSH_TOKEN }}
          GH_REPO: aomi-labs/skills
          WIDGET_REPO: ${{ github.repository }}
          WIDGET_SHA: ${{ github.sha }}
        run: |
          title="chore: sync skills from aomi-widget"
          body=$(cat <<EOF
          Syncs the published skills bundle from \`$WIDGET_REPO\`.

          Source commit: https://github.com/$WIDGET_REPO/commit/$WIDGET_SHA
          EOF
          )
          pr_number="$(gh pr list --repo "$GH_REPO" --head "aomi-labs:$BRANCH_NAME" --base main --state open --json number --jq '.[0].number')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --repo "$GH_REPO" --title "$title" --body "$body"
            exit 0
          fi

          gh pr create \
            --repo "$GH_REPO" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "$title" \
            --body "$body"

      - name: No skills changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No skills changes to publish."
